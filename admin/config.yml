backend:
  name: github # git-gateway #
  repo: ibercovich/blog
  branch: master # Branch to update (optional; defaults to master)
  base_url: https://ivanbercovich.com/
  auth_endpoint: /api/auth
media_folder: assets
# in case the public route is different, otherwise automatic
# public_folder: /assets
collections:
  ########################
  # POSTS COLLECTION
  ########################
  - name: "post"
    label: "Posts"
    folder: "_posts"
    # Keep custom-layout entries such as Timeline out of the standard editor.
    filter:
      field: "layout"
      value: "post"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Author",
          name: "author",
          widget: "hidden",
          default: "Ivan Bercovich",
        }
      - label: "Original publication date"
        name: "date"
        widget: "datetime"
        default: ""
        picker_utc: false
        hint: "Set this once when publishing. Editing or saving the post does not update it."
      - { name: "description", widget: "hidden", required: false }
      - { name: "image", widget: "hidden", required: false }
      - { name: "draft", widget: "hidden", required: false }
      - label: "Custom permalink"
        name: "permalink"
        widget: "string"
        required: false
        hint: "Leave empty to use the normal year-and-title URL."
      - label: "Redirect paths"
        name: "redirect_from"
        widget: "list"
        required: false
        default: []
        hint: "Old site paths that should redirect to this post."
        field: { label: "Path", name: "path", widget: "string" }
      - label: "Exclude from search engines"
        name: "noindex"
        widget: "boolean"
        required: false
        default: false
      - { label: "Body", name: "body", widget: "markdown" }

  ########################
  # ARCHIVED POSTS COLLECTION
  ########################
  - name: "post_archived"
    label: "Posts Archived"
    folder: "_posts_archived"
    # Exclude legacy centered pages stored alongside archived posts.
    filter:
      field: "layout"
      value: "post"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Author",
          name: "author",
          widget: "hidden",
          default: "Ivan Bercovich",
        }
      - label: "Original publication date"
        name: "date"
        widget: "datetime"
        default: ""
        picker_utc: false
        hint: "Set this once when publishing. Editing or saving the post does not update it."
      - { name: "description", widget: "hidden", required: false }
      - { name: "image", widget: "hidden", required: false }
      - { name: "draft", widget: "hidden", required: false }
      - label: "Custom permalink"
        name: "permalink"
        widget: "string"
        required: false
        hint: "Leave empty to use the normal year-and-title URL."
      - label: "Redirect paths"
        name: "redirect_from"
        widget: "list"
        required: false
        default: []
        hint: "Old site paths that should redirect to this post."
        field: { label: "Path", name: "path", widget: "string" }
      - label: "Exclude from search engines"
        name: "noindex"
        widget: "boolean"
        required: false
        default: false
      - { label: "Body", name: "body", widget: "markdown" }

  ########################
  # BOOKS COLLECTION
  ########################
  - name: "books"
    label: "Books"
    label_singular: "Book"
    folder: "_books"
    create: true
    extension: "md"
    format: "yaml-frontmatter"
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — {{author}}"
    sortable_fields: ["title", "author", "status", "commit_date"]
    view_filters:
      - { label: "Read", field: "status", pattern: "read" }
      - { label: "Want to read", field: "status", pattern: "want_to_read" }
      - { label: "Currently reading", field: "status", pattern: "currently_reading" }
      - { label: "TBD", field: "status", pattern: "tbd" }
      - { label: "Recommended", field: "recommended", pattern: "true" }
      - { label: "Physical copies", field: "physical_copy", pattern: "true" }
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Author"
        name: "author"
        widget: "string"
        hint: "Use Last, First so author sorting remains useful."
      - label: "ISBN"
        name: "isbn"
        widget: "string"
        required: false
        pattern: ['^(?:[0-9]{9}[0-9X]|[0-9]{13})$', "Use ISBN-10 or ISBN-13 without spaces or hyphens."]
      - label: "Goodreads ID"
        name: "goodreads_id"
        widget: "string"
        required: false
        pattern: ['^[0-9]+$', "Use the numeric ID from the legacy Goodreads record."]
      - label: "Cover"
        name: "cover"
        widget: "image"
        required: false
        media_folder: "/assets/covers"
        public_folder: "/assets/covers"
        choose_url: false
        allow_multiple: false
      - label: "Spine color"
        name: "color"
        widget: "color"
        default: "#6B4C3B"
        allowInput: true
        hint: "Used while a cover loads and on the animated book spine."
      - label: "Status"
        name: "status"
        widget: "select"
        default: "read"
        options:
          - { label: "Read", value: "read" }
          - { label: "Want to read", value: "want_to_read" }
          - { label: "Currently reading", value: "currently_reading" }
          - { label: "TBD", value: "tbd" }
      - label: "Collections"
        name: "collections"
        widget: "list"
        required: false
        default: []
        hint: "Optional shelves or tags, entered as a comma-separated list."
      - { label: "Physical copy", name: "physical_copy", widget: "boolean", required: false, default: false }
      - { label: "Recommended", name: "recommended", widget: "boolean", required: false, default: false }
      - label: "Finished on"
        name: "finished_on"
        widget: "datetime"
        required: false
        default: ""
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - { label: "Description", name: "synopsis", widget: "text", required: false }

  ########################
  # PAGES COLLECTION
  ########################
  - name: "pages"
    label: "Pages"
    editor:
      preview: false
    # Data-heavy pages stay code-managed until their embedded data is extracted.
    files:
      - name: "about"
        label: "About"
        file: "_pages/about.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "centered" }
          - { label: "Author", name: "author", widget: "hidden", default: "Ivan Bercovich" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/about/" }
          - label: "Last updated date"
            name: "date"
            widget: "datetime"
            required: false
            picker_utc: false
            hint: "Change this manually after a meaningful update. Saving alone does not update it."
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "research"
        label: "Research"
        file: "_pages/research.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "centered" }
          - { label: "Author", name: "author", widget: "hidden", default: "Ivan Bercovich" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/research/" }
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "principles"
        label: "Principles"
        file: "_pages/principles.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "centered" }
          - { label: "Author", name: "author", widget: "hidden", default: "Ivan Bercovich" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/principles/" }
          - label: "Last updated date"
            name: "date"
            widget: "datetime"
            required: false
            picker_utc: false
            hint: "Change this manually after a meaningful update. Saving alone does not update it."
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "safety"
        label: "AI Safety"
        file: "_pages/safety.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "centered" }
          - { label: "Author", name: "author", widget: "hidden", default: "Ivan Bercovich" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/safety/" }
          - { label: "Exclude from search engines", name: "noindex", widget: "hidden", default: true }
          - label: "Last updated date"
            name: "date"
            widget: "datetime"
            required: false
            picker_utc: false
            hint: "Change this manually after a meaningful update. Saving alone does not update it."
          - { label: "Body", name: "body", widget: "markdown" }

      - name: "antiportfolio"
        label: "Antiportfolio"
        file: "_pages/antiportfolio.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "centered" }
          - { label: "Author", name: "author", widget: "hidden", default: "Ivan Bercovich" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "hidden", default: "/antiportfolio/" }
          - label: "Last updated date"
            name: "date"
            widget: "datetime"
            required: false
            picker_utc: false
            hint: "Change this manually after a meaningful update. Saving alone does not update it."
          - { label: "Body", name: "body", widget: "markdown" }
