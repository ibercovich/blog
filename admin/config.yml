backend:
  name: github # git-gateway #
  repo: ibercovich/blog
  branch: master # Branch to update (optional; defaults to master)
  base_url: https://ivanbercovich.com/
  auth_endpoint: /api/auth
media_folder: assets
# in case the public route is different, otherwise automatic
# public_folder: /assets
collections:
  ########################
  # POSTS COLLECTION
  ########################
  - name: "post"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Author",
          name: "author",
          widget: "hidden",
          default: "Ivan Bercovich",
        }
      - label: "Original publication date"
        name: "date"
        widget: "datetime"
        default: ""
        picker_utc: false
        hint: "Set this once when publishing. Editing or saving the post does not update it."
      - { name: "description", widget: "hidden", required: false }
      - { name: "image", widget: "hidden", required: false }
      - label: "Custom permalink"
        name: "permalink"
        widget: "string"
        required: false
        hint: "Leave empty to use the normal year-and-title URL."
      - label: "Redirect paths"
        name: "redirect_from"
        widget: "list"
        required: false
        default: []
        hint: "Old site paths that should redirect to this post."
        field: { label: "Path", name: "path", widget: "string" }
      - label: "Exclude from search engines"
        name: "noindex"
        widget: "boolean"
        required: false
        default: false
      - { label: "Body", name: "body", widget: "markdown" }

  ########################
  # ARCHIVED POSTS COLLECTION
  ########################
  - name: "post_archived"
    label: "Posts Archived"
    folder: "_posts_archived"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Author",
          name: "author",
          widget: "string",
          default: "Ivan Bercovich",
        }
      - { label: "Date", name: "date", widget: "datetime" }
      # could be used for intentional summaries, e.g. the ScOp blog
      # - { label: "Description", name: "description", widget: "string" }
      - { label: "Categories", name: "categories", widget: "list" }
      - { label: "Body", name: "body", widget: "markdown" }

  ########################
  # PAGES COLLECTION
  ########################
  - name: "pages"
    label: "Pages"
    folder: "_pages"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - {
          label: "Permalink",
          name: "permalink",
          widget: "string",
          default: "/about/",
        }
      - { label: "Body", name: "body", widget: "markdown" }
