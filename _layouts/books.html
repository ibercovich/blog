---
layout: default
---

<style>
  .bookshelf {
    max-width: 900px;
    margin: 0 auto;
    border-left: 6px solid #3a2a1a;
    border-right: 6px solid #3a2a1a;
    padding: 0;
    background: #1a1207;
    overflow: hidden;
  }

  .shelf {
    display: flex;
    flex-wrap: nowrap;
    align-items: flex-end;
    padding: 12px 10px 0 10px;
    min-height: 240px;
  }

  .shelf-plank {
    height: 14px;
    background: linear-gradient(to bottom, #a07830, #6b4c28);
    border-top: 2px solid #c49a3c;
    border-bottom: 2px solid #3a2a1a;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
  }

  .book-spine {
    width: 44px;
    height: 210px;
    margin: 0 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 2px 4px 4px 2px;
    box-shadow: inset -2px 0 3px rgba(0, 0, 0, 0.3), 2px 0 3px rgba(0, 0, 0, 0.2);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    flex-shrink: 0;
  }

  .book-spine:hover {
    transform: translateY(-8px);
    box-shadow: inset -2px 0 3px rgba(0, 0, 0, 0.3), 2px 4px 10px rgba(0, 0, 0, 0.4);
    z-index: 2;
  }

  .book-spine .spine-title {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 10px;
    font-weight: 600;
    line-height: 1.1;
    text-align: center;
    padding: 8px 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-height: 195px;
    letter-spacing: 0.3px;
    user-select: none;
  }

  .book-modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.75);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .book-modal-overlay.active {
    display: flex;
  }

  .book-modal {
    text-align: center;
    max-width: 90vw;
  }

  .book-modal img {
    max-height: 60vh;
    max-width: 80vw;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
    border-radius: 4px;
  }

  .book-modal .book-info {
    color: #fff;
    margin-top: 1rem;
    font-size: 1rem;
  }

  .book-modal .book-info .book-title {
    font-weight: 700;
    font-size: 1.1rem;
  }

  .book-modal .book-info .book-author {
    color: #ccc;
    margin-top: 0.25rem;
  }

  .book-modal-close {
    position: fixed;
    top: 1rem;
    right: 1.5rem;
    background: none;
    border: none;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    z-index: 1001;
    line-height: 1;
  }

  @media (max-width: 700px) {
    .bookshelf {
      border-left-width: 4px;
      border-right-width: 4px;
    }
    .book-spine {
      width: 36px;
      height: 180px;
    }
    .shelf {
      min-height: 200px;
      padding: 8px 6px 0 6px;
    }
    .book-spine .spine-title {
      font-size: 9px;
    }
  }

  @media (max-width: 450px) {
    .book-spine {
      width: 30px;
      height: 160px;
    }
    .shelf {
      min-height: 175px;
    }
  }
</style>

{{ content }}

<div class="post">
  <h1 class="post-title">Books</h1>
  <p class="post-info" style="font-style: italic;">Click a book to see its cover.</p>
  <div class="post-line"></div>

  <div class="bookshelf" id="bookshelf"></div>
</div>

<div class="book-modal-overlay" id="bookModal">
  <button class="book-modal-close" id="bookModalClose">&times;</button>
  <div class="book-modal">
    <img id="bookModalCover" src="" alt="">
    <div class="book-info">
      <div class="book-title" id="bookModalTitle"></div>
      <div class="book-author" id="bookModalAuthor"></div>
    </div>
  </div>
</div>

<script>
(function() {
  var books = window.__BOOKS || [];

  function textColor(hex) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    return lum > 0.55 ? '#1a1a1a' : '#f0f0f0';
  }

  function booksPerShelf() {
    var container = document.getElementById('bookshelf');
    var w = container.clientWidth;
    // Determine spine width + margin based on viewport breakpoints
    var vw = window.innerWidth;
    var spineW, padW;
    if (vw <= 450) {
      spineW = 32; // 30px + 2px margin
      padW = 12;   // 6px padding each side
    } else if (vw <= 700) {
      spineW = 38; // 36px + 2px margin
      padW = 12;
    } else {
      spineW = 46; // 44px + 2px margin
      padW = 20;   // 10px padding each side
    }
    return Math.max(1, Math.floor((w - padW) / spineW));
  }

  function render() {
    var shelf = document.getElementById('bookshelf');
    shelf.innerHTML = '';
    var perShelf = booksPerShelf();

    for (var i = 0; i < books.length; i += perShelf) {
      var row = books.slice(i, i + perShelf);

      var shelfRow = document.createElement('div');
      shelfRow.className = 'shelf';

      for (var j = 0; j < row.length; j++) {
        var book = row[j];
        var spine = document.createElement('div');
        spine.className = 'book-spine';
        spine.style.backgroundColor = book.color;
        spine.dataset.index = i + j;

        var title = document.createElement('span');
        title.className = 'spine-title';
        title.textContent = book.title;
        title.style.color = textColor(book.color);
        spine.appendChild(title);

        spine.addEventListener('click', (function(b) {
          return function() { openModal(b); };
        })(book));

        shelfRow.appendChild(spine);
      }

      shelf.appendChild(shelfRow);

      var plank = document.createElement('div');
      plank.className = 'shelf-plank';
      shelf.appendChild(plank);
    }
  }

  function openModal(book) {
    var overlay = document.getElementById('bookModal');
    var img = document.getElementById('bookModalCover');
    var titleEl = document.getElementById('bookModalTitle');
    var authorEl = document.getElementById('bookModalAuthor');

    if (book.cover) {
      img.src = book.cover;
      img.style.display = 'block';
    } else {
      img.style.display = 'none';
    }
    titleEl.textContent = book.title;
    authorEl.textContent = book.author;
    overlay.classList.add('active');
  }

  function closeModal() {
    document.getElementById('bookModal').classList.remove('active');
    document.getElementById('bookModalCover').src = '';
  }

  document.getElementById('bookModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('bookModalClose').addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 200);
  });

  document.addEventListener('DOMContentLoaded', render);
})();
</script>
